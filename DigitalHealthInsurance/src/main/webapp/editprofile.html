<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Edit Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:500px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#003366;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    font-weight:bold;
    color:#003366;
    margin-bottom:8px;
}

input,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#007bff;
    box-shadow:0 0 5px rgba(0,123,255,0.3);
}

.button-group{
    display:flex;
    gap:15px;
    margin-top:30px;
}

button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
    transform:translateY(-3px);
}

.back-btn{
    background:#6c757d;
}

.back-btn:hover{
    background:#545b62;
}

</style>
</head>

<body>

<div class="container">

    <h1>✏️ Edit Profile</h1>

    <form>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" value="">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" value="">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" value="">
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" value="">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date">
        </div>

        <div class="button-group">
            <button type="submit">Update Profile</button>

            <button type="button"
                    class="back-btn"
                    onclick="window.location.href='index.html'">
                Back
            </button>
        </div>

    </form>

</div>

</body>
</html>

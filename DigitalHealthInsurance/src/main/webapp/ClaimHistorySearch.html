<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Claim History Search</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
}

.container{
    width: 400px;
    margin: 100px auto;
    background-color: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
    text-align: center;
}

h2{
    color: #333;
}

input[type="text"]{
    width: 90%;
    padding: 10px;
    margin-top: 15px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

input[type="submit"]{
    background-color: #007bff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
}

input[type="submit"]:hover{
    background-color: #0056b3;
}
</style>

</head>

<body>

<div class="container">

    <h2>Claim History Search</h2>

    <form action="ClaimHistoryList.html" method="get">

        <label><b>Enter Claim ID</b></label><br>

        <input type="text"
               name="claimId"
               placeholder="Enter Claim ID"
               required>

        <br>

        <input type="submit" value="Search">

    </form>

</div>

</body>
</html>

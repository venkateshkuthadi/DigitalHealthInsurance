<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Insurance Registration</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .container {
        width: 500px;
        margin: 40px auto;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        color: #2c3e50;
    }

    p {
        text-align: center;
        font-size: 14px;
        color: #666;
    }

    label {
        font-weight: 600;
        font-size: 14px;
    }

    .required::after {
        content: " *";
        color: red;
    }

    input, textarea, select {
        width: 100%;
        padding: 10px;
        margin: 8px 0 15px;
        border-radius: 8px;
        border: 1px solid #ddd;
    }

    input:focus, select:focus {
        border-color: #4facfe;
        box-shadow: 0 0 5px rgba(79,172,254,0.5);
    }

    .password-rules {
        font-size: 12px;
        margin-top: -10px;
        margin-bottom: 10px;
    }

    .valid { color: green; }
    .invalid { color: red; }

    button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .footer a {
        color: #007bff;
        text-decoration: none;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Health Insurance Registration</h2>
    <p>Secure your health with the best insurance plans</p>

    <form>

        <label class="required">Full Name</label>
        <input type="text" required>

        <label class="required">Email</label>
        <input type="email" required>

        <!-- Password -->
        <label class="required">Password</label>
        <input type="password" id="password" required
        pattern="(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}"
        title="Must contain at least 8 characters, one uppercase, one number, one special character"
        onkeyup="checkPassword()">

        <div class="password-rules">
            <div id="upper" class="invalid">• One uppercase letter</div>
            <div id="number" class="invalid">• One number</div>
            <div id="symbol" class="invalid">• One special character</div>
            <div id="length" class="invalid">• Minimum 8 characters</div>
        </div>

        <!-- ✅ Fixed Section (Separate Lines) -->
        <label class="required">Phone</label>
        <input type="tel" pattern="[0-9]{10}" required>

        <label>Alternate Phone</label>
        <input type="tel" pattern="[0-9]{10}">

        <label class="required">Date of Birth</label>
        <input type="date" required>

        <label class="required">Gender</label>
        <select required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label class="required">Address</label>
        <textarea rows="3" required></textarea>

        <!-- Insurance -->
        <label class="required">Do you want to take a policy?</label>
        <select required>
            <option value="">Select</option>
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Choose Policy Type</label>
        <select>
            <option value="">Select Policy</option>
            <option>Basic Health Plan</option>
            <option>Premium Health Plan</option>
            <option>Family Plan</option>
        </select>

        <button type="submit">Register</button>

    </form>

    <div class="footer">
        Already registered? <a href="#">Login here</a>
    </div>
</div>

<script>
function checkPassword() {
    let pass = document.getElementById("password").value;

    document.getElementById("upper").className =
        /[A-Z]/.test(pass) ? "valid" : "invalid";

    document.getElementById("number").className =
        /[0-9]/.test(pass) ? "valid" : "invalid";

    document.getElementById("symbol").className =
        /[!@#$%^&*]/.test(pass) ? "valid" : "invalid";

    document.getElementById("length").className =
        pass.length >= 8 ? "valid" : "invalid";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Insurance Register</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right, #667eea, #764ba2);
    }

    .container {
        width: 400px;
        margin: 60px auto;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    label {
        font-weight: 600;
        font-size: 14px;
    }

    .required::after {
        content: " *";
        color: red;
    }

    input, textarea, select {
        width: 100%;
        padding: 10px;
        margin: 8px 0 15px;
        border-radius: 8px;
        border: 1px solid #ddd;
    }

    input:focus, select:focus {
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102,126,234,0.5);
    }

    .password-rules {
        font-size: 12px;
        margin-top: -10px;
        margin-bottom: 10px;
    }

    .valid { color: green; }
    .invalid { color: red; }

    button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(to right, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    .toggle {
        float: right;
        cursor: pointer;
        font-size: 12px;
        color: #667eea;
    }

    .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <!-- ✅ Changed Title -->
    <h2>Health Insurance Registration</h2>

    <form>

        <label class="required">Full Name</label>
        <input type="text" required>

        <label class="required">Email</label>
        <input type="email" required>

        <label class="required">Password <span class="toggle" onclick="togglePassword()">Show</span></label>
        <input type="password" id="password" required onkeyup="checkPassword()">

        <div class="password-rules">
            <div id="upper" class="invalid">• At least one uppercase letter</div>
            <div id="number" class="invalid">• At least one number</div>
            <div id="symbol" class="invalid">• At least one special character</div>
            <div id="length" class="invalid">• Minimum 8 characters</div>
        </div>

        <label class="required">Phone Number</label>
        <input type="tel" pattern="[0-9]{10}" placeholder="10 digits" required>

        <label>Alternate Phone</label>
        <input type="tel" pattern="[0-9]{10}" placeholder="Optional">

        <label class="required">Date of Birth</label>
        <input type="date" required>

        <label class="required">Address</label>
        <textarea rows="3" required></textarea>

        <!-- ✅ NEW DROPDOWN -->
        <label class="required">Do you want to take a policy?</label>
        <select required>
            <option value="">Select Option</option>
            <option value="yes">Yes, I want a policy</option>
            <option value="no">No, just registering</option>
        </select>

        <button type="submit">Register</button>

    </form>

    <!-- ✅ Footer Added -->
    <div class="footer">
        Already registered? <a href="#">Login here</a>
    </div>
</div>

<script>
function checkPassword() {
    let pass = document.getElementById("password").value;

    document.getElementById("upper").className =
        /[A-Z]/.test(pass) ? "valid" : "invalid";

    document.getElementById("number").className =
        /[0-9]/.test(pass) ? "valid" : "invalid";

    document.getElementById("symbol").className =
        /[!@#$%^&*]/.test(pass) ? "valid" : "invalid";

    document.getElementById("length").className =
        pass.length >= 8 ? "valid" : "invalid";
}

function togglePassword() {
    let field = document.getElementById("password");
    field.type = field.type === "password" ? "text" : "password";
}
</script>

</body>
</html>

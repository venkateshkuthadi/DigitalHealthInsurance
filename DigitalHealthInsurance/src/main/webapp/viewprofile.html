<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>View Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:700px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#003366;
    margin-bottom:30px;
}

.profile-row{
    display:flex;
    justify-content:space-between;
    padding:15px;
    margin-bottom:15px;
    background:#f5f7fa;
    border-radius:10px;
}

.label{
    font-weight:bold;
    color:#003366;
}

.value{
    color:#555;
}

.button-container{
    margin-top:30px;
    text-align:center;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
    transform:translateY(-3px);
}

a{
    text-decoration:none;
}

</style>
</head>
<body>

<div class="container">

    <h1>👤 User Profile</h1>

    <div class="profile-row">
        <span class="label">User ID</span>
        <span class="value"></span>
    </div>

    <div class="profile-row">
        <span class="label">Full Name</span>
        <span class="value"></span>
    </div>

    <div class="profile-row">
        <span class="label">Email</span>
        <span class="value"></span>
    </div>

    <div class="profile-row">
        <span class="label">Phone Number</span>
        <span class="value"></span>
    </div>

    <div class="profile-row">
        <span class="label">Address</span>
        <span class="value"></span>
    </div>

    <div class="profile-row">
        <span class="label">Gender</span>
        <span class="value"></span>
    </div>

    <div class="profile-row">
        <span class="label">Date of Birth</span>
        <span class="value"></span>
    </div>

    <div class="button-container">

        <a href="editProfile.html">
            <button>✏️ Edit Profile</button>
        </a>

        <a href="index.html">
            <button>🏠 Dashboard</button>
        </a>

    </div>

</div>

</body>
</html>

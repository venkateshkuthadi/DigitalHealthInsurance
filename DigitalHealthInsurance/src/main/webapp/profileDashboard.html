<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:850px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#003366;
    margin-bottom:15px;
}

p{
    text-align:center;
    color:gray;
    margin-bottom:30px;
}

.menu{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.card{
    text-decoration:none;
}

button{
    width:100%;
    padding:18px;
    font-size:18px;
    border:none;
    border-radius:15px;
    background:#007bff;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.back-home{
    grid-column:1/3;
}

</style>

</head>
<body>

<div class="container">

    <h1> User Dashboard</h1>

    <p>Welcome to Health Insurance Management System</p>

    <div class="menu">

        <a class="card" href="viewProfile.html">
            <button>👤 View Profile</button>
        </a>

        <a class="card" href="editProfile.html">
            <button>✏️ Edit Profile</button>
        </a>

        <a class="card" href="changePassword.html">
            <button>🔒 Change Password</button>
        </a>

        <a class="card" href="policyDetails.html">
            <button>📄 Policy Details</button>
        </a>

        <a class="card" href="nomineeDetails.html">
            <button>👨‍👩‍👧 Add Nominee Details</button>
        </a>

        <a class="card" href="viewNominee.html">
            <button>📋 View Nominee Details</button>
        </a>

        <a class="card back-home" href="home.html">
            <button>🏠 Back to Home</button>
        </a>

    </div>

</div>

</body>
</html>
